<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-index 실습</title>
    <style>
        div{
            position: relative;
        }
        img{
            position: absolute;
            width: 100px;
            height: 140px;
        }
        #spadeA{
            left: 10px;
            top: 20px;
        }
        #spade2{
            left: 40px;
            top: 30px;
        }
        
    </style>
</head>
<body>
    <h3>z-index 프로퍼티</h3>
    <hr>
    <div>
        <img src="images/spade-A.png" alt="" id="spadeA">
        <img src="images/spade-2.png" alt="" id="spade2">
        <img src="images/spade-3.png" alt="" id="spade3">
        <img src="images/spade-7.png" alt="" id="spade7">
    </div>
</body>
</html>
