<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 움직이기</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .bigbox{
            width: 404px;
            display: flex;
            flex-wrap: wrap;
        }
        .box{
            width: 200px;
            height: 200px;
            border: 1px solid gray;
            display: flex;
        }
        .character{
            width: 100px;
            height: 100px;
        }
        #box1{
            background-color: blue;
            justify-content: center;
            align-items: center;
        }
        #box2{
            background-color: red;
            justify-content: flex-end;
            align-items: flex-start;
        }
        #box3{
            background-color: yellow;
            justify-content: flex-start;
            align-items: flex-end;
        }
        #box4{
            background-color: orange;
            justify-content: flex-end;
            align-items: flex-end;
        }
    </style>
</head>
<body>
    <div class="bigbox">
        <div id="box1" class="box">
            <img id="img01" class="character" src="images/luke.jpg" alt="">
        </div>
        <div id="box2" class="box">
            <img id="img02" class="character" src="images/luke.jpg" alt="">
        </div>
        <div id="box3" class="box">
            <img id="img03" class="character" src="images/luke.jpg" alt="">
        </div>
        <div id="box4" class="box">
            <img id="img04" class="character" src="images/luke.jpg" alt="">
        </div>
    </div>
</body>
</html>
